name: NakedPantree
options:
  bundleIdPrefix: cc.mnmlst
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  schemePathPrefix: ../

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_MODULE_VERIFIER: YES
    DEVELOPMENT_TEAM: YJBSSS9C6C

packages:
  Core:
    path: Packages/Core

targets:
  NakedPantree:
    type: application
    platform: iOS
    supportedDestinations:
      - iOS
      - macDesignedForIPad
    sources:
      - path: NakedPantreeApp
        excludes:
          - "**/*.md"
    resources:
      - path: NakedPantreeApp/Resources/Assets.xcassets
      - path: NakedPantreeApp/Resources/PrivacyInfo.xcprivacy
    dependencies:
      - package: Core
        product: NakedPantreeDomain
      - package: Core
        product: NakedPantreePersistence
    settings:
      base:
        PRODUCT_MODULE_NAME: NakedPantree
        PRODUCT_NAME: "Naked Pantree"
        PRODUCT_BUNDLE_IDENTIFIER: cc.mnmlst.nakedpantree
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NakedPantreeApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: NakedPantreeApp/Resources/NakedPantree.entitlements
        # Manual signing for both configs (issue #92). The original
        # plan had Debug on Automatic with a separate `*.dev` bundle
        # id and dev iCloud container so local builds wouldn't touch
        # TestFlight data. In practice, for a solo project at v1.0
        # that's overkill — it doubled the entitlements/profile/
        # container surface area without paying off in isolation
        # value. Collapsed in this commit (apps#101): single bundle
        # id, single entitlements file, single iCloud container,
        # manual signing in both configs.
        #
        # Local dev needs the "Github Publish" profile installed via
        # `open ~/Downloads/Github_Publish.mobileprovision` and the
        # "Apple Distribution: Andrew Ellis" cert in the login
        # keychain — same setup CI uses (replicated in
        # `.github/workflows/testflight-beta.yml` and `build-test.yml`).
        #
        # Why on the target's `base` (not on the cmdline): cmdline
        # build settings cascade to SwiftPM-generated resource
        # bundles (`Core_NakedPantreePersistence`) which reject
        # profile specifiers — pinning to the target keeps signing
        # scoped correctly.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "Github Publish"

  NakedPantreeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NakedPantreeTests
    dependencies:
      - target: NakedPantree
      - package: Core
        product: NakedPantreeDomain
      - package: Core
        product: NakedPantreePersistence
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Naked Pantree.app/Naked Pantree"

  NakedPantreeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NakedPantreeUITests
    dependencies:
      - target: NakedPantree
    settings:
      base:
        TEST_TARGET_NAME: NakedPantree

schemes:
  NakedPantree:
    build:
      targets:
        NakedPantree: all
    test:
      targets:
        - NakedPantreeTests
        - NakedPantreeUITests
      gatherCoverageData: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
