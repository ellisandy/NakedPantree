name: NakedPantree
options:
  bundleIdPrefix: com.ellisandy
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  schemePathPrefix: ../

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_MODULE_VERIFIER: YES
    DEVELOPMENT_TEAM: ""

packages:
  Core:
    path: Packages/Core

targets:
  NakedPantree:
    type: application
    platform: iOS
    supportedDestinations:
      - iPhone
      - iPad
      - macDesignedForIPad
    sources:
      - path: NakedPantreeApp
        excludes:
          - "**/*.md"
    resources:
      - path: NakedPantreeApp/Resources/Assets.xcassets
    dependencies:
      - package: Core
        product: NakedPantreeDomain
      - package: Core
        product: NakedPantreePersistence
    info:
      path: NakedPantreeApp/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellisandy.NakedPantree
        PRODUCT_NAME: "Naked Pantree"
        PRODUCT_MODULE_NAME: NakedPantree
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO

  NakedPantreeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NakedPantreeTests
    dependencies:
      - target: NakedPantree
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Naked Pantree.app/Naked Pantree"

  NakedPantreeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NakedPantreeUITests
    dependencies:
      - target: NakedPantree
    settings:
      base:
        TEST_TARGET_NAME: NakedPantree

schemes:
  NakedPantree:
    build:
      targets:
        NakedPantree: all
    test:
      targets:
        - NakedPantreeTests
        - NakedPantreeUITests
      gatherCoverageData: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
