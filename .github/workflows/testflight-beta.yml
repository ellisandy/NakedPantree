name: TestFlight Beta

on:
  push:
    branches: [main]
    paths:
      - "**/*.swift"
      - "Packages/**"
      - "NakedPantreeApp/**"
      - "project.yml"
      - ".github/workflows/testflight-beta.yml"
      - "ci_scripts/**"
  workflow_dispatch:

# Don't cancel an in-flight upload if a second push lands — TestFlight
# rejects mid-upload aborts and we'd burn a build number for nothing.
concurrency:
  group: testflight-beta-${{ github.ref }}
  cancel-in-progress: false

jobs:
  archive-and-upload:
    name: Archive & TestFlight upload
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      # The .p8 stays on the runner only for this job. The well-known
      # path lets `xcodebuild -authenticationKeyPath` and
      # `xcrun altool --apiKey` find it without surfacing the secret
      # in command lines.
      #
      # The secret can be either the PEM text directly (starts with
      # `-----BEGIN PRIVATE KEY-----`) or its base64 encoding. The
      # PEM-direct path forgives the most common user mistake: pasting
      # the `.p8` file contents into the secret value box instead of
      # running `base64 -i AuthKey_*.p8 | pbcopy`. After writing, we
      # sanity-check the file before letting xcodebuild's much-less-
      # informative `keyPathInvalid` surface.
      - name: Decode App Store Connect API key
        env:
          API_KEY_RAW: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8

          if printf '%s' "$API_KEY_RAW" | head -c 32 | grep -q -- '-----BEGIN'; then
            echo "▸ Secret looks like raw PEM — writing as-is"
            printf '%s' "$API_KEY_RAW" > "$KEY_PATH"
          else
            echo "▸ Secret looks like base64 — decoding"
            printf '%s' "$API_KEY_RAW" | base64 -d > "$KEY_PATH"
          fi
          chmod 600 "$KEY_PATH"

          SIZE=$(wc -c < "$KEY_PATH" | tr -d ' ')
          FIRST_LINE=$(head -n 1 "$KEY_PATH")
          LAST_LINE=$(tail -n 1 "$KEY_PATH" | tr -d '\r')
          echo "▸ Key file: $SIZE bytes, first line: $FIRST_LINE"

          if [ "$SIZE" -lt 200 ]; then
            echo "::error::Decoded key is only $SIZE bytes — expected ~250+ for an App Store Connect .p8. Re-check APP_STORE_CONNECT_API_KEY."
            exit 1
          fi
          if [ "$FIRST_LINE" != "-----BEGIN PRIVATE KEY-----" ]; then
            echo "::error::Decoded key doesn't start with PEM header. Got: $FIRST_LINE"
            echo "::error::Re-check APP_STORE_CONNECT_API_KEY — paste either the .p8 contents directly or its base64 encoding (see DEVELOPMENT.md §6)."
            exit 1
          fi
          if [ "$LAST_LINE" != "-----END PRIVATE KEY-----" ]; then
            echo "::warning::Decoded key tail is '$LAST_LINE' (expected '-----END PRIVATE KEY-----'). xcodebuild may still accept it; surfacing for visibility."
          fi

      # `CURRENT_PROJECT_VERSION` overrides `CFBundleVersion` (build
      # number) at archive time. TestFlight requires a strictly
      # increasing build number per marketing version; deriving from
      # `GITHUB_RUN_NUMBER` keeps it monotonic without committing
      # back to the repo. Marketing version (`CFBundleShortVersionString`)
      # stays at whatever Info.plist holds — bump that by hand when
      # the milestone changes.
      - name: Archive
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project NakedPantree.xcodeproj \
            -scheme NakedPantree \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/NakedPantree.xcarchive \
            -skipPackagePluginValidation \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"

      # `app-store-connect` is the modern method name; older Xcode
      # called it `app-store`. `signingStyle = automatic` lets Xcode
      # fetch / regenerate provisioning profiles via the API key —
      # avoids storing certs and profiles as repo secrets.
      - name: Write export options
        run: |
          mkdir -p build
          cat > build/exportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/NakedPantree.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA=$(find build/export -name '*.ipa' | head -n1)
          [ -n "$IPA" ] || { echo "No .ipa produced"; exit 1; }
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload archive on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: NakedPantree.xcarchive
          path: build/NakedPantree.xcarchive
          if-no-files-found: ignore
